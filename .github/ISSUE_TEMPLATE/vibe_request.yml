name: Vibe request
description: Suggest a new vibe for the library.
title: "[Vibe request] "
labels:
  - vibe request
body:
  - type: markdown
    attributes:
      value: Describe the vibe first; the color choices will follow.
  - type: input
    id: vibe
    attributes:
      label: Vibe
      description: Name the existing vibe or describe the new vibe you have in mind.
      placeholder: Burning the Midnight Oil
    validations:
      required: true
  - type: dropdown
    id: appearance
    attributes:
      label: Appearance
      options:
        - Light
        - Dark
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: What should this vibe feel right for?
      description: Describe the work, time of day, or situation that calls for this vibe.
    validations:
      required: true
  - type: textarea
    id: colors
    attributes:
      label: Colors or references
      description: Share useful colors, screenshots, references, or combinations to explore.
  - type: input
    id: name
    attributes:
      label: Optional vibe name
      placeholder: Sunday Reset
